configuration:
  doc:
    alternatives:
      foo:
        name: FOO
        context:
          key: foo-var
      bar:
        name: BAR
        context:
          key: bar-var
parts:
  - alternatives:
      foo:
        commands:
          - command: "echo {{ alternative }} {{ alternative_name }}: {{ key }}"
      bar:
        commands:
          - command: "ls {{ alternative }} {{ alternative_name }}: {{ key }}"
  # to test that variables now disappear
  - commands:
      - command: "echo x{{ alternative }}x y{{ alternative_name }}y z{{ key }}z"

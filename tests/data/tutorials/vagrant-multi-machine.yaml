configuration:
  run:
    runner:
      path: structured_tutorials.runners.vagrant.VagrantRunner
parts:
  - commands:
      - command: ls a
      - command: ls b
        run:
          options:
            machine: bar
      - command: ls c
    run:
      options:
        machine: foo
  - source: "vagrant.yaml"
    destination: "/tmp/rendered-template.yaml"
    run:
      options:
        machine: bar
  # This is on the default machine again
  - commands:
      - command: ls